<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PC Service</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
  background: linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
}

/* NAV */
.navbar{
  background: linear-gradient(90deg,#ff4d4d,#4f46e5,#06b6d4);
}

/* HEADER */
header{
  padding:80px 20px;
  text-align:center;
  background: linear-gradient(120deg,#ff512f,#dd2476,#24c6dc);
  border-radius:0 0 30px 30px;
}

/* CARDS */
.card{
  border:none;
  border-radius:18px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  color:white;
  transition:0.3s;
  box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

.card:hover{
  transform: translateY(-8px) scale(1.02);
  box-shadow:0 15px 30px rgba(0,0,0,0.5);
}

/* PRICE */
.price{
  font-weight:bold;
  color:#00ffd5;
}

/* BUTTON */
.btn-primary{
  background: linear-gradient(90deg,#ff512f,#f09819);
  border:none;
  font-weight:bold;
}
.btn-primary:hover{
  filter:brightness(1.1);
}

/* INPUTS */
input,select,textarea{
  background: rgba(255,255,255,0.1) !important;
  border:1px solid rgba(255,255,255,0.2) !important;
  color:white !important;
}

input::placeholder,textarea::placeholder{
  color:#cbd5e1;
}

/* FOOTER */
footer{
  margin-top:60px;
  background: linear-gradient(90deg,#1f2937,#111827);
}
</style>
</head>

<body>

<nav class="navbar navbar-dark">
  <div class="container">
    <span class="navbar-brand fw-bold">⚡ PC Service</span>
  </div>
</nav>

<header>
  <h1>🔥 Ремонт ПК швидко та якісно</h1>
  <p>Ми робимо твій комп’ютер швидшим 🚀</p>
</header>

<div class="container my-5">

<h3 class="mb-3">Наші послуги</h3>

<div class="row g-3 mb-5">
  <div class="col-md-4">
    <div class="card p-3 text-center">
      <h5>🧹 Чистка ПК</h5>
      <div class="price">300 грн</div>
    </div>
  </div>

  <div class="col-md-4">
    <div class="card p-3 text-center">
      <h5>💻 Windows</h5>
      <div class="price">500 грн</div>
    </div>
  </div>

  <div class="col-md-4">
    <div class="card p-3 text-center">
      <h5>🔧 Діагностика</h5>
      <div class="price">200 грн</div>
    </div>
  </div>
</div>

<h3>Заявка</h3>

<form id="form" class="card p-4">

<input class="form-control mb-2" placeholder="Ім'я" required>
<input class="form-control mb-2" placeholder="Телефон" required>

<select class="form-select mb-2">
  <option>Ноутбук</option>
  <option>ПК</option>
</select>

<select class="form-select mb-2">
  <option>Чистка</option>
  <option>Windows</option>
  <option>Діагностика</option>
</select>

<textarea class="form-control mb-3" placeholder="Коментар"></textarea>

<button class="btn btn-primary w-100">Відправити 🚀</button>

</form>

</div>

<footer class="text-white text-center p-3">
  📞 +380953260948
</footer>

</body>
</html>
